name: SAP Incremental Scraper

on:
  # Run on schedule (every day at 9 AM UTC)
  schedule:
    - cron: '0 9 * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Number of days to look back.'
        required: false
        default: '7'
      max_candidates:
        description: 'Max candidates to process (leave empty for all)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Install ChromeDriver
      uses: nanasess/setup-chromedriver@v2

    - name: Install Xvfb (Virtual Display)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb

    - name: Display Chrome version
      run: |
        google-chrome --version
        chromedriver --version

    - name: Run SAP Scraper with Xvfb
      env:
        SAP_URL: ${{ secrets.SAP_URL }}
        SAP_COMPANY_ID: ${{ secrets.SAP_COMPANY_ID }}
        SAP_AGENCY_ID: ${{ secrets.SAP_AGENCY_ID }}
        SAP_USER_EMAIL: ${{ secrets.SAP_USER_EMAIL }}
        SAP_PASSWORD: ${{ secrets.SAP_PASSWORD }}
        SAP_MAX_CANDIDATES: ${{ github.event.inputs.max_candidates || '' }}
        DISPLAY: ':99'
      run: |
        # Start Xvfb (virtual display)
        Xvfb :99 -screen 0 1920x1080x24 &
        sleep 3

        # Run the scraper (using working automated script)
        python sap_scraper_automated.py

    - name: Upload extracted data
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sap-candidates-${{ github.run_number }}
        path: |
          sap_cdp_candidates_*.csv
          sap_cdp_candidates_*.xlsx
        retention-days: 90

    - name: Upload logs and screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scraper-logs-${{ github.run_number }}
        path: |
          *.log
          *.png
          *.html
        retention-days: 30

    - name: Notify on failure
      if: failure()
      run: |
        echo "Scraper failed! Check the logs."
        # You can add Slack/email notification here
