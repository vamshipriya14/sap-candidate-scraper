name: SAP Incremental Scraper

on:
  schedule:
    - cron: '*/30 * * * *'

  workflow_dispatch:
    inputs:
      days_back:
        description: 'Number of days to look back'
        required: false
        default: '7'
      max_candidates:
        description: 'Max candidates to process'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ✅ Install Chrome + dependencies (IMPORTANT)
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Display versions
        run: |
          google-chrome --version
          chromedriver --version
          python --version

      # ✅ Run scraper
      - name: Run SAP Scraper
        env:
          SAP_URL: ${{ secrets.SAP_URL }}
          SAP_COMPANY_ID: ${{ secrets.SAP_COMPANY_ID }}
          SAP_AGENCY_ID: ${{ secrets.SAP_AGENCY_ID }}
          SAP_EMAIL: ${{ secrets.SAP_USER_EMAIL }}
          SAP_PASSWORD: ${{ secrets.SAP_PASSWORD }}

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

          MAX_CANDIDATES: ${{ github.event.inputs.max_candidates || '100' }}

        run: |
          python sap_scraper_automated.py

      # ✅ Upload outputs
      - name: Upload extracted data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sap-candidates-${{ github.run_number }}
          path: |
            output_*.xlsx
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_number }}
          path: |
            *.log
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "Scraper failed! Check logs."
